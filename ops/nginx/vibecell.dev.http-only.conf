# vibecell.dev — HTTP-only transitional config (used during cert bootstrap).
#
# This is a temporary placeholder that:
#   (a) serves Let's Encrypt HTTP-01 challenges from /var/www/certbot
#   (b) proxies everything else to hangar-nginx-1 :8080 over plain HTTP
#
# Once the TLS cert is issued, replace this file with vibecell.dev.conf
# (the full HTTP→HTTPS redirect + 443 block).

server {
    listen 80;
    listen [::]:80;
    server_name vibecell.dev www.vibecell.dev;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://172.17.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
