upstream hangar_backend {
  server backend:8000;
}

upstream hangar_frontend {
  server frontend:80;
}

server {
  listen 80 default_server;
  server_name _;

  client_max_body_size 10M;

  # ─── Security headers (Spec 6 Trust & Safety) ─────────────────────────
  # HSTS is emitted by the terminating TLS proxy (Cloudflare edge). We
  # still emit it here for direct-to-origin requests during failover.
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  # Clickjacking defence — Vibecell is never embedded.
  add_header X-Frame-Options "DENY" always;
  # Prevent MIME-sniffing attacks.
  add_header X-Content-Type-Options "nosniff" always;
  # Don't leak full URLs as Referer to cross-origin targets.
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  # Disable unused browser capabilities outright.
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
  # Content Security Policy. Vue 3 production bundle avoids eval; inline
  # styles are used heavily across the SPA so style-src 'unsafe-inline' is
  # required. data: URIs are allowed for favicons/images that are inlined
  # by Vite, and img-src https: covers GitHub avatars and friends.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

  # Server-Sent Events — the /events/stream endpoints need long-lived
  # connections + zero buffering. Must come BEFORE the generic /api/ block
  # because nginx matches prefix-longer-wins only for '=' / '^~' locations,
  # and a regex match like this one wins over plain prefix anyway.
  location ~ ^/api/v1/projects/[^/]+/events/stream$ {
    proxy_pass http://hangar_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_buffering off;                 # stream frames through immediately
    proxy_cache off;
    proxy_read_timeout 24h;              # cron of life — backend sends 20s heartbeats
    proxy_send_timeout 24h;
    chunked_transfer_encoding on;
  }

  # Backend API
  location /api/ {
    proxy_pass http://hangar_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # OAuth 2.1 authorization server (Spec 3.5) — backend endpoints
  # Note: /oauth/consent is a frontend SPA route (see location = /oauth/consent below)
  location = /oauth/authorize {
    proxy_pass http://hangar_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }
  location = /oauth/consent-context {
    proxy_pass http://hangar_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
  location = /oauth/grant {
    proxy_pass http://hangar_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
  location = /oauth/deny {
    proxy_pass http://hangar_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
  location = /oauth/token {
    proxy_pass http://hangar_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
  location = /oauth/revoke {
    proxy_pass http://hangar_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
  location = /oauth/register {
    proxy_pass http://hangar_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # OAuth / MCP discovery metadata (RFC 8414, RFC 9728)
  location = /.well-known/oauth-authorization-server {
    proxy_pass http://hangar_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
  location = /.well-known/oauth-protected-resource {
    proxy_pass http://hangar_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
  location = /.well-known/jwks.json {
    proxy_pass http://hangar_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # MCP Streamable HTTP endpoint (Spec 3.5 Phase 2)
  location = /mcp {
    proxy_pass http://hangar_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_buffering off;
  }

  # Prometheus metrics (Spec 3.5 Phase 4)
  location = /metrics {
    proxy_pass http://hangar_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # POST / → MCP endpoint (clients that treat base URL as MCP URL, e.g. Claude Desktop)
  # GET / → frontend SPA
  location = / {
    if ($request_method = POST) {
      rewrite ^ /mcp last;
    }
    proxy_pass http://hangar_frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Static frontend (catch-all for SPA routes)
  location / {
    proxy_pass http://hangar_frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}
