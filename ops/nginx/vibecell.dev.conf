# vibecell.dev — outer edge nginx (agentready-nginx-1).
#
# This file lives in-repo as the canonical server block; it gets copied
# into agentready-nginx-1's /etc/nginx/conf.d/ via `docker cp` and a
# reload. The cert files are issued by certbot (webroot challenge) and
# land in the `agentready_certbot-conf` volume, which is also mounted
# into agentready-nginx-1 at /etc/letsencrypt. The `agentready_certbot-www`
# volume at /var/www/certbot is the webroot for HTTP-01 challenges.
#
# The upstream is hangar-nginx-1 on the host's docker0 bridge gateway
# (172.17.0.1:8080 — 8080 is published by hangar-nginx-1 on the host).
# That avoids needing to add agentready-nginx-1 to the hangar_default
# network (which would require an agentready compose-file change).

# HTTP: serve Let's Encrypt challenges + redirect to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name vibecell.dev www.vibecell.dev;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: reverse-proxy to hangar-nginx-1 via the host gateway :8080.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name vibecell.dev www.vibecell.dev;

    ssl_certificate /etc/letsencrypt/live/vibecell.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vibecell.dev/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    # HSTS — disabled until we're sure certs auto-renew.
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    client_max_body_size 10M;

    location / {
        proxy_pass http://172.17.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
