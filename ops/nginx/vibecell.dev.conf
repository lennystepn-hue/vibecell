# vibecell.dev — outer edge nginx (agentready-nginx-1).
#
# This file lives in-repo as the canonical server block; it gets copied
# into agentready-nginx-1's /etc/nginx/conf.d/ via `docker cp` and a
# reload. The cert files are issued by certbot (webroot challenge) and
# land in the `agentready_certbot-conf` volume, which is also mounted
# into agentready-nginx-1 at /etc/letsencrypt. The `agentready_certbot-www`
# volume at /var/www/certbot is the webroot for HTTP-01 challenges.
#
# The upstream is hangar-nginx-1 on the host's docker0 bridge gateway
# (172.17.0.1:8080 — 8080 is published by hangar-nginx-1 on the host).
# That avoids needing to add agentready-nginx-1 to the hangar_default
# network (which would require an agentready compose-file change).

# HTTP: serve Let's Encrypt challenges + redirect to HTTPS.
# status.vibecell.dev is included on the same server block so the same
# certbot HTTP-01 webroot serves its challenge — admin runs:
#   certbot --cert-name vibecell.dev --expand \
#     -d vibecell.dev -d www.vibecell.dev -d status.vibecell.dev
# to add the SAN entry.
server {
    listen 80;
    listen [::]:80;
    server_name vibecell.dev www.vibecell.dev status.vibecell.dev;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: reverse-proxy to hangar-nginx-1 via the host gateway :8080.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name vibecell.dev www.vibecell.dev;

    ssl_certificate /etc/letsencrypt/live/vibecell.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vibecell.dev/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    # HSTS — certbot has auto-renewed reliably for months at this point,
    # so the original "wait and see" caveat is satisfied. 6-month max-age
    # (not the full 1y) so we can still recover if a renewal blip lands.
    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;

    # Defence-in-depth headers. CSP is intentionally relatively loose on
    # script-src + style-src because Vite-built bundles use inline JSON
    # config in <script> tags + Stripe Checkout uses inline styles.
    # We can tighten with a nonce later if/when we add a script-loading
    # build step.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self 'https://js.stripe.com'), usb=(), magnetometer=(), accelerometer=(), gyroscope=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' https://api.stripe.com https://*.ingest.sentry.io; frame-src https://js.stripe.com https://hooks.stripe.com; object-src 'none'; base-uri 'self'; form-action 'self' https://checkout.stripe.com" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    client_max_body_size 10M;

    location / {
        proxy_pass http://172.17.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# Spec-6 C4 — public status page lives on its own subdomain so external
# uptime monitors / customers can bookmark it. It's a thin redirect server:
# bare requests to / redirect to /status (which the SPA handles), everything
# else (assets, /api/v1/status) proxies through to the main upstream.
#
# DNS: status.vibecell.dev CNAME vibecell.dev (Cloudflare proxied).
# Cert: covered by the SAN added to the main vibecell.dev cert (see HTTP
# block above for the certbot --expand command).
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name status.vibecell.dev;

    ssl_certificate /etc/letsencrypt/live/vibecell.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vibecell.dev/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Bare hits land on /status directly — no AnonLanding flash.
    location = / {
        return 302 https://status.vibecell.dev/status;
    }

    location / {
        proxy_pass http://172.17.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
